name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pyflakes

      - name: Lint with flake8
        run: |
          flake8 waveletspect.py --max-line-length=120 --statistics

      - name: Check syntax
        run: |
          python -c "import ast; ast.parse(open('waveletspect.py').read())"
          echo "Syntax OK"
